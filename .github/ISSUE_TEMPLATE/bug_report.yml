name: Bug report
description: Something is broken on the Steam Deck
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version (release ZIP)
      placeholder: e.g. v0.1.0
  - type: input
    id: decky
    attributes:
      label: Decky Loader version
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: journalctl -u map-storage-automount.service -b
      render: shell
